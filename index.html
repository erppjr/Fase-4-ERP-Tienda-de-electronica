<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Tienda de Electrónica</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Phosphor Icons (for modern icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="ph-fill ph-circuitry"></i>
                <h2>ERP</h2>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="dashboard">
                    <i class="ph ph-squares-four"></i>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" data-view="inventario">
                    <i class="ph ph-package"></i>
                    <span>Inventario</span>
                </button>
                <button class="nav-item" data-view="pedidos">
                    <i class="ph ph-shopping-cart"></i>
                    <span>Pedidos</span>
                </button>
                <button class="nav-item" data-view="incidencias">
                    <i class="ph ph-warning-circle"></i>
                    <span>Incidencias</span>
                </button>
                <button class="nav-item" data-view="proveedores">
                    <i class="ph ph-truck"></i>
                    <span>Proveedores</span>
                </button>
                <button class="nav-item" data-view="tareas">
                    <i class="ph ph-check-square"></i>
                    <span>Tareas</span>
                </button>
                <button class="nav-item" id="nav-finanzas" data-view="finanzas">
                    <i class="ph ph-currency-circle-dollar"></i>
                    <span>Finanzas</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Avatar" class="avatar">
                    <div class="user-details">
                        <span class="user-name">Usuario Actual</span>
                        <span class="user-role" id="display-role">Gerente</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">


                <div class="header-actions">
                    <!-- Sistema de alertas -->
                    <button class="action-btn notifications-btn">
                        <i class="ph ph-bell"></i>
                        <span class="badge">3</span>
                    </button>

                    <!-- Selector de Roles -->
                    <div class="role-selector">
                        <label for="role-select" class="sr-only">Rol:</label>
                        <select id="role-select" class="glass-select">
                            <option value="gerente">Gerente</option>
                            <option value="almacen">Responsable Almacén</option>
                            <option value="tienda">Empleado Tienda</option>
                        </select>
                    </div>

                    <!-- Botón Modo Claro/Oscuro -->
                    <button id="theme-toggle" class="action-btn theme-btn">
                        <i class="ph ph-moon"></i>
                    </button>
                </div>
            </header>

            <!-- Dynamic Views Container -->
            <div id="view-container" class="view-container">
                <!-- Views will be injected here by JS -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
